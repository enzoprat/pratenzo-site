<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050B1A"/>
      <stop offset="50%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#0E1F3A"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(34,197,94,0.5)"/>
      <stop offset="100%" stop-color="rgba(34,197,94,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(16,185,129,0.4)"/>
      <stop offset="100%" stop-color="rgba(16,185,129,0)"/>
    </radialGradient>
    <linearGradient id="logo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#14532D"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glows -->
  <circle cx="180" cy="180" r="280" fill="url(#glow1)"/>
  <circle cx="1050" cy="500" r="320" fill="url(#glow2)"/>

  <!-- Logo mark -->
  <rect x="80" y="80" width="80" height="80" rx="22" fill="url(#logo)"/>
  <text x="120" y="135" text-anchor="middle"
        font-family="-apple-system,Helvetica,Arial,sans-serif"
        font-size="26" font-weight="800" fill="#fff" letter-spacing="0.04em">PE</text>

  <!-- Brand name top-right -->
  <text x="180" y="135"
        font-family="-apple-system,Helvetica,Arial,sans-serif"
        font-size="34" font-weight="700" fill="#fff" letter-spacing="-0.02em">Prat Enzo</text>

  <!-- Pill agence -->
  <rect x="80" y="220" width="320" height="44" rx="22"
        fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
  <text x="240" y="248" text-anchor="middle"
        font-family="-apple-system,Helvetica,Arial,sans-serif"
        font-size="15" font-weight="600" fill="#4ADE80" letter-spacing="0.12em">CRÉATION DE SITES WEB PRO</text>

  <!-- Big title -->
  <text x="80" y="340"
        font-family="-apple-system,Helvetica,Arial,sans-serif"
        font-size="68" font-weight="800" fill="#fff" letter-spacing="-0.035em">Des sites web modernes</text>
  <text x="80" y="420"
        font-family="-apple-system,Helvetica,Arial,sans-serif"
        font-size="68" font-weight="800" fill="url(#text)" letter-spacing="-0.035em">pour développer votre activité</text>

  <!-- Sub services -->
  <text x="80" y="500"
        font-family="-apple-system,Helvetica,Arial,sans-serif"
        font-size="22" font-weight="500" fill="rgba(255,255,255,0.72)">Sites vitrines · E-commerce · Click &amp; collect · Refonte</text>

  <!-- Bottom URL -->
  <text x="80" y="565"
        font-family="-apple-system,Helvetica,Arial,sans-serif"
        font-size="20" font-weight="600" fill="#4ADE80" letter-spacing="0.04em">pratenzo.fr</text>
</svg>
